# Copy this file to config.ini, then adjust values for your network.
# CLI flags override values from this file.

listen = 127.0.0.1:40443
connect = 104.19.229.21:443
fake-sni = hcaptcha.com

# TLS fingerprint for the injected fake ClientHello.
# Use "none" for the legacy fixed ClientHello template.
utls = firefox

fake-repeat = 1
fake-delay = 2ms
ack-timeout = 2s
injector = active

# Optional real ClientHello fragmentation after fake injection.
enable-fragment = false
fragment-delay = 500ms
# SNI bytes per write; 3 means "hca", "ptc", "ha.", "com" for hcaptcha.com.
sni-chunk = 3
